name: 'Claude Code CLI'
base_url: 'https://code.claude.com/docs/en'

discovery:
  method: llms_txt
  url: 'https://code.claude.com/docs/llms.txt'

download:
  rate_limit: 0.0
  timeout: 30
  append_md: false

processing:
  strip_frontmatter: false
  clean_blank_lines: true

sections:
  derive_from: null

output:
  quick_reference:
    file: cli-quick-reference.md
    max_chars_per_page: 2500
    priority_paths:
      - /overview.md
      - /quickstart.md
      - /common-workflows.md
      - /best-practices.md
      - /features-overview.md
      - /how-claude-code-works.md
      - /plugins.md
      - /skills.md
      - /hooks-guide.md
      - /sub-agents.md

  section_index:
    file: cli-section-index.md

  full_docs:
    file: cli-full-docs.txt
